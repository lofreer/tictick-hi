name: tictick-hi

x-hi-app: &hi-app
  build:
    context: .
  image: tictick-hi:local

x-app-environment: &app-environment
  DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB in .env}?sslmode=disable
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_FORMAT: ${LOG_FORMAT:-text}
  LOG_CORRELATION_ID: ${LOG_CORRELATION_ID:-}
  DB_MAX_CONNS: ${DB_MAX_CONNS:-10}
  DB_MIN_CONNS: ${DB_MIN_CONNS:-0}
  DB_MAX_CONN_LIFETIME: ${DB_MAX_CONN_LIFETIME:-1h}
  DB_MAX_CONN_IDLE_TIME: ${DB_MAX_CONN_IDLE_TIME:-30m}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    <<: *hi-app
    command: ["migrate"]
    environment:
      <<: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    <<: *hi-app
    command: ["api"]
    environment:
      <<: *app-environment
      HTTP_ADDR: 0.0.0.0:8080
      WEB_FRONTEND_DIST: /app/web/frontend/dist
      AUTH_SESSION_TTL: ${AUTH_SESSION_TTL:-12h}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      BINANCE_BASE_URLS: ${BINANCE_BASE_URLS:-https://api.binance.com,https://data-api.binance.vision}
      BINANCE_REQUEST_WEIGHT_LIMIT: ${BINANCE_REQUEST_WEIGHT_LIMIT:-1200}
      BINANCE_REQUEST_WEIGHT_WINDOW: ${BINANCE_REQUEST_WEIGHT_WINDOW:-1m}
      OKX_MARKET_REQUEST_LIMIT: ${OKX_MARKET_REQUEST_LIMIT:-20}
      OKX_MARKET_REQUEST_WINDOW: ${OKX_MARKET_REQUEST_WINDOW:-2s}
      BOOTSTRAP_OPERATOR_USERNAME: ${BOOTSTRAP_OPERATOR_USERNAME:?set BOOTSTRAP_OPERATOR_USERNAME in .env}
      BOOTSTRAP_OPERATOR_PASSWORD: ${BOOTSTRAP_OPERATOR_PASSWORD:?set BOOTSTRAP_OPERATOR_PASSWORD in .env}
    ports:
      - "${HTTP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/readyz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  sync:
    <<: *hi-app
    command: ["sync"]
    environment:
      <<: *app-environment
      BINANCE_BASE_URLS: ${BINANCE_BASE_URLS:-https://api.binance.com,https://data-api.binance.vision}
      BINANCE_REQUEST_WEIGHT_LIMIT: ${BINANCE_REQUEST_WEIGHT_LIMIT:-1200}
      BINANCE_REQUEST_WEIGHT_WINDOW: ${BINANCE_REQUEST_WEIGHT_WINDOW:-1m}
      OKX_MARKET_REQUEST_LIMIT: ${OKX_MARKET_REQUEST_LIMIT:-20}
      OKX_MARKET_REQUEST_WINDOW: ${OKX_MARKET_REQUEST_WINDOW:-2s}
      SYNC_HEARTBEAT_INTERVAL: ${SYNC_HEARTBEAT_INTERVAL:-10s}
      SYNC_POLL_INTERVAL: ${SYNC_POLL_INTERVAL:-10s}
      SYNC_FETCH_RETRIES: ${SYNC_FETCH_RETRIES:-2}
      SYNC_RETRY_DELAY: ${SYNC_RETRY_DELAY:-250ms}
      SYNC_RETRY_BACKOFF: ${SYNC_RETRY_BACKOFF:-30s}
      SYNC_MAX_RETRY_BACKOFF: ${SYNC_MAX_RETRY_BACKOFF:-5m}
      SYNC_HEALTH_ADDR: ${SYNC_HEALTH_ADDR:-}
      SYNC_READY_MAX_BACKLOG: ${SYNC_READY_MAX_BACKLOG:-}
      SYNC_READY_MAX_AGE: ${SYNC_READY_MAX_AGE:-}
      MARKET_INSTRUMENT_SYNC_ENABLED: ${MARKET_INSTRUMENT_SYNC_ENABLED:-true}
      MARKET_INSTRUMENT_SYNC_ON_START: ${MARKET_INSTRUMENT_SYNC_ON_START:-true}
      MARKET_INSTRUMENT_SYNC_INTERVAL: ${MARKET_INSTRUMENT_SYNC_INTERVAL:-6h}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  backtest:
    <<: *hi-app
    command: ["backtest"]
    environment:
      <<: *app-environment
      BACKTEST_POLL_INTERVAL: ${BACKTEST_POLL_INTERVAL:-10s}
      BACKTEST_HEALTH_ADDR: ${BACKTEST_HEALTH_ADDR:-}
      BACKTEST_READY_MAX_BACKLOG: ${BACKTEST_READY_MAX_BACKLOG:-}
      BACKTEST_READY_MAX_AGE: ${BACKTEST_READY_MAX_AGE:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  trading:
    <<: *hi-app
    command: ["trading"]
    environment:
      <<: *app-environment
      TRADING_POLL_INTERVAL: ${TRADING_POLL_INTERVAL:-10s}
      TRADING_HEALTH_ADDR: ${TRADING_HEALTH_ADDR:-}
      TRADING_READY_MAX_BACKLOG: ${TRADING_READY_MAX_BACKLOG:-}
      TRADING_READY_MAX_AGE: ${TRADING_READY_MAX_AGE:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  notify:
    <<: *hi-app
    command: ["notify"]
    environment:
      <<: *app-environment
      NOTIFY_POLL_INTERVAL: ${NOTIFY_POLL_INTERVAL:-10s}
      NOTIFY_RETRY_DELAY: ${NOTIFY_RETRY_DELAY:-30s}
      NOTIFY_MAX_RETRY_DELAY: ${NOTIFY_MAX_RETRY_DELAY:-5m}
      NOTIFY_HEALTH_ADDR: ${NOTIFY_HEALTH_ADDR:-}
      NOTIFY_READY_MAX_BACKLOG: ${NOTIFY_READY_MAX_BACKLOG:-}
      NOTIFY_READY_MAX_AGE: ${NOTIFY_READY_MAX_AGE:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
