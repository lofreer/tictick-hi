name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-quality-gate:
    name: Full local quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install quality gate tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Install frontend dependencies
        run: pnpm --dir web/frontend install --frozen-lockfile

      - name: Run full quality gate
        run: scripts/full-quality-gate.sh
